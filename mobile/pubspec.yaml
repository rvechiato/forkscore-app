name: forkscore
description: "ForkScore - Aplicativo de avaliação gastronômica"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # HTTP & Networking
  dio: ^5.3.0
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Navigation
  go_router: ^10.0.0
  flutter_screenutil: ^5.8.0
  
  # Validation & Models
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1
  
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting & Formatting
  flutter_lints: ^2.0.0
  
  # Code generation
  build_runner: ^2.4.7
  freezed: ^2.4.5

flutter:
  uses-material-design: true
