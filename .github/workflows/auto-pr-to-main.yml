name: Auto PR To Main

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Create pull request if missing
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace("refs/heads/", "");
            const { owner, repo } = context.repo;
            try {
              const existing = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: `${owner}:${branch}`,
                base: "main",
              });

              if (existing.data.length > 0) {
                core.info(`Open PR already exists for ${branch}.`);
                return;
              }

              const title = `chore: merge ${branch} into main`;
              const body = [
                "PR opened automatically after a push to a non-main branch.",
                "",
                `Source branch: \`${branch}\``,
                "Base branch: `main`",
              ].join("\n");

              const pullRequest = await github.rest.pulls.create({
                owner,
                repo,
                title,
                head: branch,
                base: "main",
                body,
              });

              core.info(`Created PR #${pullRequest.data.number} for ${branch}.`);
            } catch (error) {
              if (error.status === 403) {
                core.warning(
                  "GitHub Actions is not permitted to create pull requests. " +
                  "Enable this in Settings > Actions > General > Workflow permissions."
                );
                return;
              }

              throw error;
            }
